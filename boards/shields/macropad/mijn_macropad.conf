# Bluetooth naam
CONFIG_ZMK_KEYBOARD_NAME="MijnMacropad"

# Bluetooth aan
CONFIG_BT=y
CONFIG_ZMK_BLE=y

# Rotary encoder aan
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# USB aan (voor wired gebruik)
CONFIG_ZMK_USB=y

# Slaapstand na 30 min inactiviteit
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
